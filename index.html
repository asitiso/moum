<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>센온 어플모음</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nanum Gothic',sans-serif;min-height:100vh;background:#fffbf0;background-image:radial-gradient(ellipse 70% 50% at 10% 0%,#fef3c7 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 95% 100%,#fde68a 0%,transparent 55%);background-attachment:fixed}
.header{padding:52px 22px 14px;display:flex;align-items:flex-end;justify-content:space-between}
.header-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;color:#d97706;text-transform:uppercase;margin-bottom:3px}
.header-title{font-family:'Nanum Myeongjo',serif;font-size:30px;font-weight:800;color:#78350f;line-height:1}
.header-count{font-size:12px;color:#b45309;margin-top:4px;font-weight:700}
.add-btn{width:46px;height:46px;border-radius:14px;border:none;cursor:pointer;background:#f59e0b;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(245,158,11,.45);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;flex-shrink:0}
.add-btn:hover{transform:scale(1.12) rotate(15deg);box-shadow:0 10px 28px rgba(245,158,11,.55)}
.add-btn:active{transform:scale(.92)}
.add-btn svg{width:22px;height:22px;stroke:#fff;stroke-width:2.8;fill:none}
.main{padding:10px 18px 100px}
.section-title{font-size:11px;font-weight:800;color:rgba(180,83,9,.45);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 10px}
.app-item{display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{transform:scale(.5) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.app-icon-img{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;box-shadow:0 4px 14px rgba(180,83,9,.18);border:2px solid rgba(255,255,255,.8);background:#fff;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.app-icon-img img{width:40px;height:40px;object-fit:contain}
.app-icon-img:hover,.flower-icon:hover{transform:translateY(-5px) scale(1.08);box-shadow:0 10px 24px rgba(180,83,9,.25)}
.app-icon-img:active,.flower-icon:active{transform:scale(.92)}
.flower-icon{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:2px solid rgba(255,255,255,.7);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
.flower-icon svg{width:42px;height:42px}
.app-name{font-size:10.5px;color:#78350f;text-align:center;max-width:68px;line-height:1.35;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:keep-all}
.app-actions{position:absolute;top:-6px;right:-2px;display:flex;gap:3px;opacity:0;transition:opacity .18s;z-index:5}
.app-item:hover .app-actions{opacity:1}
.act-btn{width:22px;height:22px;border-radius:50%;border:2px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.act-btn:hover{transform:scale(1.25)}
.act-edit{background:#fbbf24;color:#78350f}
.act-del{background:#f87171;color:#7f1d1d}
.empty{text-align:center;padding:50px 20px 40px}
.empty-card{background:rgba(255,255,255,.7);backdrop-filter:blur(16px);border-radius:28px;padding:36px 24px;border:1.5px solid rgba(245,158,11,.2);box-shadow:0 8px 32px rgba(180,83,9,.08)}
.empty-icon{width:72px;height:72px;border-radius:24px;margin:0 auto 18px;background:#f59e0b;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(245,158,11,.4);animation:float 3s ease-in-out infinite;font-size:36px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty h3{font-family:'Nanum Myeongjo',serif;font-size:20px;font-weight:800;color:#78350f;margin-bottom:8px}
.empty p{font-size:13px;color:rgba(120,53,15,.6);line-height:1.7}
.empty-btn{margin-top:22px;display:inline-flex;align-items:center;gap:8px;background:#f59e0b;color:#fff;border:none;border-radius:30px;padding:12px 26px;font-size:14px;font-family:'Nanum Gothic',sans-serif;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(245,158,11,.45);transition:transform .18s}
.empty-btn:hover{transform:scale(1.05)}
.overlay{position:fixed;inset:0;background:rgba(60,20,5,.35);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:rgba(255,251,240,.97);backdrop-filter:blur(30px);border-radius:32px 32px 0 0;width:100%;max-width:480px;padding:10px 20px 40px;border-top:2px solid rgba(245,158,11,.3);box-shadow:0 -4px 40px rgba(180,83,9,.15);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:4px;background:rgba(180,83,9,.2);margin:0 auto 20px}
.modal-title{font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:800;color:#78350f;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.preview-card{display:flex;align-items:center;gap:14px;background:rgba(245,158,11,.07);border:1.5px solid rgba(245,158,11,.25);border-radius:20px;padding:12px 14px;margin-bottom:16px}
.preview-icon-box{width:52px;height:52px;border-radius:16px;background:#fff;border:1.5px solid rgba(245,158,11,.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 2px 10px rgba(180,83,9,.1)}
.preview-icon-box img{width:34px;height:34px;object-fit:contain}
.preview-flower-box{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid rgba(255,255,255,.6)}
.preview-flower-box svg{width:32px;height:32px}
.preview-info{flex:1;min-width:0}
.preview-name-txt{font-size:14px;font-weight:800;color:#78350f;margin-bottom:3px}
.preview-desc-txt{font-size:12px;color:rgba(120,53,15,.65);line-height:1.4}
.loading-anim{color:#f59e0b;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:800;color:rgba(180,83,9,.55);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.form-input,.form-textarea{width:100%;background:rgba(245,158,11,.06);border:1.5px solid rgba(245,158,11,.2);border-radius:14px;padding:11px 14px;font-size:15px;font-family:'Nanum Gothic',sans-serif;color:#78350f;outline:none;transition:border-color .18s,background .18s,box-shadow .18s}
.form-input:focus,.form-textarea:focus{border-color:rgba(245,158,11,.6);background:#fff;box-shadow:0 0 0 4px rgba(245,158,11,.1)}
.form-textarea{resize:none;height:68px;line-height:1.55}
.char-row{display:flex;justify-content:flex-end;margin-top:5px}
.char-badge{font-size:11px;font-weight:700;color:rgba(180,83,9,.6);background:rgba(245,158,11,.12);border-radius:20px;padding:2px 9px}
.btn-row{display:flex;gap:10px;margin-top:6px}
.btn-cancel{flex:1;padding:13px;border:1.5px solid rgba(245,158,11,.25);border-radius:16px;background:transparent;font-size:14px;cursor:pointer;color:rgba(120,53,15,.65);font-family:'Nanum Gothic',sans-serif;font-weight:700;transition:background .15s}
.btn-cancel:hover{background:rgba(245,158,11,.07)}
.btn-save{flex:2.5;padding:13px;border:none;border-radius:16px;background:#f59e0b;font-size:15px;cursor:pointer;color:#fff;font-family:'Nanum Gothic',sans-serif;font-weight:800;box-shadow:0 6px 20px rgba(245,158,11,.4);transition:transform .18s,box-shadow .18s}
.btn-save:hover{transform:scale(1.03);box-shadow:0 8px 26px rgba(245,158,11,.5)}
.btn-save:active{transform:scale(.97)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(245,158,11,.3);border-radius:8px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-eyebrow">센트럴온누리약국</div>
    <div class="header-title">앱 모음 🌸</div>
    <div class="header-count" id="app-count">앱 0개</div>
  </div>
  <button class="add-btn" id="btn-add" aria-label="앱 추가">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<div class="main">
  <div id="grid-wrap" style="display:none">
    <div class="section-title">내 앱</div>
    <div class="grid" id="app-grid"></div>
  </div>
  <div class="empty" id="empty-state">
    <div class="empty-card">
      <div class="empty-icon">🌼</div>
      <h3>아직 앱이 없어요</h3>
      <p>자주 쓰는 웹앱을 추가하면<br>여기 모여요!</p>
      <button class="empty-btn" id="btn-empty-add">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        첫 번째 앱 추가
      </button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title"><span id="modal-emoji">🌸</span>&nbsp;<span id="modal-title-text">새 앱 추가</span></div>
    <div class="form-group">
      <label class="form-label">앱 주소 URL</label>
      <input class="form-input" type="url" id="input-url" placeholder="https://">
    </div>
    <div class="preview-card" id="preview-area" style="display:none">
      <div id="preview-icon-wrap" class="preview-icon-box"></div>
      <div class="preview-info">
        <div class="preview-name-txt" id="preview-name">—</div>
        <div class="preview-desc-txt" id="preview-desc">—</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">앱 이름</label>
      <input class="form-input" type="text" id="input-name" placeholder="앱 이름 (10자 이내)" maxlength="10">
    </div>
    <div class="form-group">
      <label class="form-label">짧은 설명</label>
      <textarea class="form-textarea" id="input-desc" placeholder="20자 이내" maxlength="20"></textarea>
      <div class="char-row"><span class="char-badge"><span id="char-count">0</span>/20</span></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" id="btn-cancel">취소</button>
      <button class="btn-save" id="btn-save" onclick="saveApp()">저장하기</button>
    </div>
  </div>
</div>

<script>

const GEMINI_KEY = 'AQ.Ab8RN6LHG6mUEABmeYcmR-VGfm_vqUcv4b30BmrYqJ_V_Tadxw';
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';

/* ── 꽃 SVG 생성 함수 8종 ── */
function makePetals(angles, rx, ry, dist, c, op) {
  return angles.map(function(a) {
    return '<ellipse rx="'+rx+'" ry="'+ry+'" transform="rotate('+a+') translate('+dist+',0)" fill="'+c+'" opacity="'+op+'"/>';
  }).join('');
}

const FLOWER_FNS = [
  function(c) { // 해바라기
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,22)">'+makePetals([0,45,90,135,180,225,270,315],7,4,10,c,0.9)+'<circle r="9" fill="#f59e0b"/><circle r="5" fill="#92400e"/></g></svg>';
  },
  function(c) { // 벚꽃
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,22)">'+makePetals([0,72,144,216,288],8,5,9,c,0.85)+'<circle r="5" fill="#fff" opacity="0.9"/><circle r="2.5" fill="'+c+'"/></g></svg>';
  },
  function(c) { // 데이지
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,22)">'+makePetals([0,30,60,90,120,150,180,210,240,270,300,330],5,3,9,c,0.8)+'<circle r="6" fill="#fef3c7"/><circle r="3" fill="#f59e0b"/></g></svg>';
  },
  function(c) { // 튤립
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><ellipse cx="22" cy="18" rx="8" ry="11" fill="'+c+'" opacity="0.9"/><ellipse cx="15" cy="22" rx="6" ry="9" fill="'+c+'" opacity="0.75" transform="rotate(-20,15,22)"/><ellipse cx="29" cy="22" rx="6" ry="9" fill="'+c+'" opacity="0.75" transform="rotate(20,29,22)"/><rect x="20" y="28" width="4" height="10" rx="2" fill="#16a34a"/><ellipse cx="16" cy="34" rx="5" ry="3" fill="#16a34a" opacity="0.7" transform="rotate(-30,16,34)"/></svg>';
  },
  function(c) { // 장미
    var petals = [0,60,120,180,240,300].map(function(a,i) {
      return '<ellipse rx="'+(9-i*0.5)+'" ry="'+(6-i*0.3)+'" transform="rotate('+(a+i*15)+') translate('+(6-i)+',0)" fill="'+c+'" opacity="'+(0.9-i*0.08).toFixed(2)+'"/>';
    }).join('');
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,22)">'+petals+'<circle r="4" fill="'+c+'"/><circle r="2" fill="#fff" opacity="0.5"/></g></svg>';
  },
  function(c) { // 코스모스
    var petals = [0,45,90,135,180,225,270,315].map(function(a) {
      return '<path d="M0,0 Q3,-10 0,-16 Q-3,-10 0,0" transform="rotate('+a+')" fill="'+c+'" opacity="0.85"/>';
    }).join('');
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,22)">'+petals+'<circle r="5" fill="#fef08a"/><circle r="2.5" fill="#f59e0b"/></g></svg>';
  },
  function(c) { // 클로버꽃
    var petals = [0,90,180,270].map(function(a) {
      return '<circle r="8" cx="0" cy="-10" transform="rotate('+a+')" fill="'+c+'" opacity="0.82"/>';
    }).join('');
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,22)">'+petals+'<circle r="5" fill="#fff" opacity="0.9"/><circle r="2.5" fill="'+c+'"/></g></svg>';
  },
  function(c) { // 수국
    var pts = [[-8,-8],[8,-8],[-8,8],[8,8],[-10,0],[10,0],[0,-10],[0,10]];
    var circles = pts.map(function(p) {
      return '<circle r="5" cx="'+p[0]+'" cy="'+p[1]+'" fill="'+c+'" opacity="0.72"/>';
    }).join('');
    return '<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><g transform="translate(22,22)">'+circles+'<circle r="4" fill="#fff" opacity="0.6"/></g></svg>';
  }
];

const FLOWER_BG = [
  '#fde68a','#fecaca','#bbf7d0','#bfdbfe','#ddd6fe','#fed7aa','#fbcfe8','#a7f3d0',
  '#fef08a','#fca5a5','#6ee7b7','#93c5fd','#c4b5fd','#fdba74','#f9a8d4','#34d399'
];

function getFlowerInfo(name) {
  var seed = 0;
  var s = name || '가';
  for (var i = 0; i < s.length; i++) seed += s.charCodeAt(i);
  return {
    fn: FLOWER_FNS[seed % FLOWER_FNS.length],
    bg: FLOWER_BG[(seed * 7 + 3) % FLOWER_BG.length]
  };
}

function makeFlowerDiv(name, url, isPreview) {
  var info = getFlowerInfo(name);
  var svg = info.fn('#fff');
  var size = isPreview ? '52px' : '64px';
  var radius = isPreview ? '16px' : '20px';
  var cls = isPreview ? 'preview-flower-box' : 'flower-icon';
  var shadow = isPreview ? '' : 'box-shadow:0 4px 14px rgba(0,0,0,0.15);';
  var onclick = url ? ' onclick="APP.open(\''+escAttr(url)+'\')"' : '';
  return '<div class="'+cls+'" style="background:'+info.bg+';width:'+size+';height:'+size+';border-radius:'+radius+';'+shadow+'"'+onclick+'>'+svg+'</div>';
}

/* ── 유틸 ── */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
function getDomain(url) {
  try { return new URL(url).hostname; } catch(e) { return url; }
}

/* ── 파비콘 ── */
function probeImage(src) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() { resolve(src); };
    img.onerror = function() { resolve(null); };
    img.src = src;
    setTimeout(function() { resolve(null); }, 2500);
  });
}
async function resolveFavicon(url) {
  try {
    var u = new URL(url);
    var candidates = [
      'https://www.google.com/s2/favicons?sz=64&domain='+u.hostname,
      'https://icons.duckduckgo.com/ip3/'+u.hostname+'.ico',
      u.origin+'/favicon.ico',
      u.origin+'/favicon.png'
    ];
    for (var i = 0; i < candidates.length; i++) {
      var r = await probeImage(candidates[i]);
      if (r) return r;
    }
  } catch(e) {}
  return '';
}

/* ── 앱 상태 ── */
var apps = [];
var editingId = null;
var urlTimer = null;
var pendingIcon = '';
var pendingName = '';

function loadApps() {
  try { apps = JSON.parse(localStorage.getItem('cenon-apps') || '[]'); } catch(e) { apps = []; }
  render();
}
function saveApps() {
  try {
    localStorage.setItem('cenon-apps', JSON.stringify(apps));
  } catch(e) {
    console.error('localStorage 저장 실패:', e);
  }
}

/* ── 렌더 ── */
function render() {
  var grid = document.getElementById('app-grid');
  var empty = document.getElementById('empty-state');
  var gw = document.getElementById('grid-wrap');
  document.getElementById('app-count').textContent = '앱 '+apps.length+'개';
  if (!apps.length) { gw.style.display='none'; empty.style.display='block'; return; }
  empty.style.display='none'; gw.style.display='block';
  grid.innerHTML = apps.map(function(a, i) {
    var iconHtml;
    if (a.icon) {
      iconHtml = '<div class="app-icon-img" onclick="APP.open(\''+escAttr(a.url)+'\')"><img src="'+escHtml(a.icon)+'" alt="" onerror="APP.swapToFlower(this,\''+escAttr(a.name)+'\',\''+escAttr(a.url)+'\')"></div>';
    } else {
      iconHtml = makeFlowerDiv(a.name, a.url, false);
    }
    return '<div class="app-item" style="animation-delay:'+i*35+'ms">'
      +'<div class="app-actions">'
      +'<button class="act-btn act-edit" onclick="APP.edit(\''+a.id+'\')">✏️</button>'
      +'<button class="act-btn act-del" onclick="APP.del(\''+a.id+'\')">🗑️</button>'
      +'</div>'
      +iconHtml
      +'<div class="app-name">'+escHtml(a.name)+'</div>'
      +'</div>';
  }).join('');
}

/* ── 모달 ── */
function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function resetForm() {
  pendingIcon = ''; pendingName = '';
  document.getElementById('input-url').value = '';
  document.getElementById('input-name').value = '';
  document.getElementById('input-desc').value = '';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('preview-area').style.display = 'none';
}

function openAdd() {
  editingId = null; resetForm();
  document.getElementById('modal-emoji').textContent = '🌸';
  document.getElementById('modal-title-text').textContent = '새 앱 추가';
  openModal();
}

function openEdit(id) {
  var a = apps.find(function(x) { return x.id === id; });
  if (!a) return;
  editingId = id; resetForm();
  pendingIcon = a.icon || ''; pendingName = a.name;
  document.getElementById('modal-emoji').textContent = '✏️';
  document.getElementById('modal-title-text').textContent = '앱 수정';
  document.getElementById('input-url').value = a.url;
  document.getElementById('input-name').value = a.name;
  document.getElementById('input-desc').value = a.desc || '';
  document.getElementById('char-count').textContent = (a.desc||'').length;
  setPreview(a.name, a.desc||'', a.icon||'', false);
  openModal();
}

function setPreview(name, desc, icon, loading) {
  document.getElementById('preview-area').style.display = 'flex';
  document.getElementById('preview-name').textContent = name || '—';
  var descEl = document.getElementById('preview-desc');
  descEl.textContent = loading ? 'AI가 읽어오는 중...' : (desc || '—');
  descEl.className = 'preview-desc-txt' + (loading ? ' loading-anim' : '');
  var wrap = document.getElementById('preview-icon-wrap');
  if (icon) {
    wrap.className = 'preview-icon-box';
    wrap.style.background = '';
    wrap.innerHTML = '<img src="'+escHtml(icon)+'" alt="" style="width:34px;height:34px;object-fit:contain">';
  } else if (name) {
    var flower = makeFlowerDiv(name, '', true);
    var tmp = document.createElement('div');
    tmp.innerHTML = flower;
    var newEl = tmp.firstElementChild;
    newEl.id = 'preview-icon-wrap';
    wrap.replaceWith(newEl);
  } else {
    wrap.className = 'preview-icon-box';
    wrap.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>';
  }
}

/* ── URL 입력 ── */
document.getElementById('input-url').addEventListener('input', function() {
  clearTimeout(urlTimer);
  var val = this.value.trim();
  if (!val) { document.getElementById('preview-area').style.display='none'; return; }
  urlTimer = setTimeout(function() { fetchMeta(val); }, 700);
});

document.getElementById('input-desc').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length;
  document.getElementById('preview-desc').textContent = this.value || '설명 없음';
  document.getElementById('preview-desc').className = 'preview-desc-txt';
});

async function fetchMeta(url) {
  if (!/^https?:\/\//.test(url)) url = 'https://'+url;
  document.getElementById('input-url').value = url;
  var domain = getDomain(url);
  var nameEl = document.getElementById('input-name');
  var autoName = domain.replace('www.','').split('.')[0];

  setPreview(autoName, '', '', true);
  if (!nameEl.value) nameEl.value = autoName;

  var results = await Promise.all([resolveFavicon(url), callGemini(url, domain)]);
  var faviconUrl = results[0];
  var aiResult = results[1];

  var aiName = aiResult.name || '';
  var aiDesc = aiResult.desc || '';
  var finalName = aiName || autoName;

  if (!nameEl.value || nameEl.value === autoName) {
    nameEl.value = finalName;
  }
  pendingIcon = faviconUrl;
  pendingName = finalName;

  document.getElementById('input-desc').value = aiDesc;
  document.getElementById('char-count').textContent = aiDesc.length;
  setPreview(finalName, aiDesc, faviconUrl, false);
}

async function callGemini(url, domain) {
  try {
    var prompt = '다음 웹사이트를 분석해서 아래 JSON 형식으로만 답해줘. 다른 말은 절대 쓰지 마.\n'
      + 'URL: '+url+'\n도메인: '+domain+'\n\n'
      + '{\n'
      + '  "name": "이 웹서비스의 실제 이름이나 서비스명. 도메인의 랜덤 문자열(예:illustrious-bonbon 같은 것)은 절대 쓰지 말고, 서비스 특성으로 유추한 한국어 이름. 10자 이내",\n'
      + '  "desc": "서비스 한 줄 설명. 한국어 20자 이내. 이모지 없이"\n'
      + '}';
    var res = await fetch(GEMINI_URL+'?key='+GEMINI_KEY, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: [{parts:[{text: prompt}]}],
        generationConfig: {maxOutputTokens:120, temperature:0.2}
      })
    });
    var data = await res.json();
    var raw = ((data.candidates||[])[0]||{});
    var text = ((raw.content||{}).parts||[{text:''}])[0].text || '';
    var clean = text.trim().replace(/```json|```/g,'').trim();
    var json = JSON.parse(clean);
    return {
      name: (json.name||'').replace(/["']/g,'').slice(0,10),
      desc: (json.desc||'').replace(/["']/g,'').slice(0,20)
    };
  } catch(e) { return {name:'', desc:''}; }
}

/* ── 저장/삭제 ── */
function saveApp() {
  var url = document.getElementById('input-url').value.trim();
  var name = document.getElementById('input-name').value.trim();
  var desc = document.getElementById('input-desc').value.trim();
  if (!url || !name) { alert('URL과 이름을 입력해 주세요 🌸'); return; }
  var entry = {url:url, name:name, desc:desc, icon:pendingIcon};
  if (editingId) {
    var idx = apps.findIndex(function(a) { return a.id===editingId; });
    if (idx>=0) apps[idx] = Object.assign({}, apps[idx], entry);
  } else {
    apps.push(Object.assign({id: Date.now().toString()}, entry));
  }
  saveApps(); render(); closeModal();
}

/* ── 전역 앱 객체 (onclick용) ── */
window.APP = {
  open: function(url) { window.open(url,'_blank'); },
  edit: function(id) { openEdit(id); },
  del: function(id) {
    if (!confirm('이 앱을 삭제할까요?')) return;
    apps = apps.filter(function(a) { return a.id!==id; });
    saveApps(); render();
  },
  swapToFlower: function(img, name, url) {
    var wrap = img.closest('.app-icon-img');
    if (!wrap) return;
    wrap.outerHTML = makeFlowerDiv(name, url, false);
  }
};

/* ── 이벤트 바인딩 ── */
document.getElementById('btn-add').addEventListener('click', openAdd);
document.getElementById('btn-empty-add').addEventListener('click', openAdd);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-save').addEventListener('click', saveApp);
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadApps();
</script>
