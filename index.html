<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>센온 어플모음</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF8FAB;
    --pink-light: #FFD6E0;
    --pink-pale: #FFF0F4;
    --yellow: #FFD166;
    --yellow-light: #FFF3CD;
    --mint: #95E1D3;
    --mint-light: #E0F7F4;
    --lavender: #C3B1E1;
    --lavender-light: #EDE7F6;
    --bg: #FFF8FA;
    --card: #FFFFFF;
    --text: #3D2C35;
    --text-muted: #A08C96;
    --border: #F2D9E2;
    --shadow: rgba(255,143,171,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(255,214,224,0.55) 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(195,177,225,0.35) 0%, transparent 40%);
  }

  /* ── 헤더 ── */
  .header {
    background: var(--card);
    border-bottom: 2px dashed var(--pink-light);
    padding: 14px 18px 12px;
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 8px; }

  .header-emoji {
    font-size: 26px;
    line-height: 1;
    animation: bounce 2.4s ease-in-out infinite;
  }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .header-texts h1 {
    font-family: 'Gaegu', cursive;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .header-texts span {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .add-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink) 0%, #FF6B9D 100%);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(255,107,157,0.45);
    transition: transform 0.18s, box-shadow 0.18s;
    font-size: 22px;
    color: #fff;
    font-weight: 700;
    line-height: 1;
  }

  .add-btn:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 6px 18px rgba(255,107,157,0.55); }
  .add-btn:active { transform: scale(0.95); }

  /* ── 메인 ── */
  .main { padding: 16px 14px 80px; max-width: 480px; margin: 0 auto; }

  /* ── 섹션 분류 뱃지 ── */
  .cat-label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--pink-light);
    color: #C94070;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  /* ── 앱 그리드 ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  /* ── 앱 아이템 ── */
  .app-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .app-icon-wrap {
    width: 62px;
    height: 62px;
    border-radius: 18px;
    background: var(--card);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    box-shadow: 0 3px 10px var(--shadow);
  }

  .app-icon-wrap:hover {
    transform: translateY(-4px) scale(1.06);
    box-shadow: 0 8px 22px var(--shadow);
    border-color: var(--pink);
  }

  .app-icon-wrap:active { transform: scale(0.94); }

  .app-icon-wrap img {
    width: 38px;
    height: 38px;
    object-fit: contain;
  }

  .fallback-icon-svg {
    width: 32px;
    height: 32px;
    opacity: 0.4;
  }

  .app-name {
    font-size: 10.5px;
    color: var(--text);
    text-align: center;
    max-width: 66px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: keep-all;
    font-weight: 700;
  }

  /* 수정/삭제 버튼 */
  .app-actions {
    position: absolute;
    top: -7px;
    right: -4px;
    display: flex;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.18s;
    z-index: 5;
  }

  .app-item:hover .app-actions { opacity: 1; }

  .act-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: transform 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .act-btn:hover { transform: scale(1.2); }
  .act-edit { background: var(--yellow); color: #7A5800; }
  .act-del  { background: #FF8FAB;  color: #7A0030; }

  /* ── 빈 상태 ── */
  .empty {
    text-align: center;
    padding: 3rem 1rem 2rem;
  }

  .empty-art {
    font-size: 58px;
    margin-bottom: 10px;
    display: block;
    animation: wobble 3s ease-in-out infinite;
  }

  @keyframes wobble {
    0%,100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
  }

  .empty h3 {
    font-family: 'Gaegu', cursive;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .empty p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .empty-btn {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--pink) 0%, #FF6B9D 100%);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 10px 22px;
    font-size: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(255,107,157,0.45);
    transition: transform 0.18s;
  }

  .empty-btn:hover { transform: scale(1.05); }

  /* ── 모달 오버레이 ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(61,44,53,0.38);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 32px;
    border-top: 3px solid var(--pink-light);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-drag {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-family: 'Gaegu', cursive;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .modal label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.03em;
  }

  .modal input,
  .modal textarea {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 10px 13px;
    font-size: 14px;
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--pink-pale);
    color: var(--text);
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.18s, background 0.18s;
  }

  .modal input:focus,
  .modal textarea:focus {
    border-color: var(--pink);
    background: #fff;
  }

  .modal textarea { resize: none; height: 64px; line-height: 1.5; }

  .char-wrap {
    display: flex;
    justify-content: flex-end;
    margin-top: -8px;
    margin-bottom: 10px;
  }

  .char-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--pink-light);
    border-radius: 10px;
    padding: 2px 8px;
  }

  /* 미리보기 카드 */
  .preview-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, var(--pink-pale) 0%, var(--lavender-light) 100%);
    border: 2px dashed var(--pink-light);
    border-radius: 18px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }

  .preview-icon {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    background: #fff;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .preview-icon img { width: 34px; height: 34px; object-fit: contain; }

  .preview-info { flex: 1; min-width: 0; }

  .preview-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .preview-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .preview-loading {
    color: var(--pink);
    font-style: italic;
  }

  .loading-dots::after {
    content: '●●●';
    animation: ldots 1.2s steps(3) infinite;
    letter-spacing: 2px;
    font-size: 8px;
    vertical-align: middle;
  }

  @keyframes ldots {
    0%  { content: '●○○'; }
    33% { content: '○●○'; }
    66% { content: '○○●'; }
  }

  /* 버튼 */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .btn-cancel {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 16px;
    background: transparent;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    transition: background 0.15s;
  }

  .btn-cancel:hover { background: var(--pink-pale); }

  .btn-save {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--pink) 0%, #FF6B9D 100%);
    font-size: 14px;
    cursor: pointer;
    color: #fff;
    font-family: 'Nanum Gothic', sans-serif;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(255,107,157,0.4);
    transition: transform 0.18s;
  }

  .btn-save:hover { transform: scale(1.03); }
  .btn-save:active { transform: scale(0.97); }

  /* ── 스크롤바 ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--pink-light); border-radius: 10px; }

  /* 작은 꽃 데코 */
  .deco {
    position: fixed;
    pointer-events: none;
    font-size: 18px;
    opacity: 0.18;
    z-index: 0;
  }
  .deco-1 { top: 80px;  left: 10px; animation: spin 12s linear infinite; }
  .deco-2 { top: 200px; right: 8px; animation: spin 8s linear infinite reverse; font-size: 14px; }
  .deco-3 { bottom: 120px; left: 14px; animation: spin 15s linear infinite; font-size: 12px; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<span class="deco deco-1">🌸</span>
<span class="deco deco-2">⭐</span>
<span class="deco deco-3">🌼</span>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <span class="header-emoji">💊</span>
    <div class="header-texts">
      <h1>센온 어플모음</h1>
      <span id="app-count">앱 0개</span>
    </div>
  </div>
  <button class="add-btn" onclick="openAdd()" aria-label="앱 추가">＋</button>
</div>

<!-- 메인 -->
<div class="main">
  <div id="grid-wrap" style="display:none">
    <div class="cat-label">🗂️ 내 앱 목록</div>
    <div class="grid" id="app-grid"></div>
  </div>

  <!-- 빈 상태 -->
  <div class="empty" id="empty-state">
    <span class="empty-art">🐾</span>
    <h3>아직 앱이 없어요!</h3>
    <p>자주 쓰는 웹앱 주소를 추가하면<br>여기에 모여요 🌸</p>
    <button class="empty-btn" onclick="openAdd()">＋ 첫 번째 앱 추가</button>
  </div>
</div>

<!-- 모달 -->
<div class="overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-drag"></div>
    <div class="modal-title">
      <span id="modal-emoji">✨</span>
      <span id="modal-title-text">새 앱 추가</span>
    </div>

    <label>앱 주소 (URL)</label>
    <input type="url" id="input-url" placeholder="https://" oninput="onUrlInput(this.value)">

    <!-- 미리보기 -->
    <div class="preview-card" id="preview-area" style="display:none">
      <div class="preview-icon" id="preview-icon-wrap">
        <svg class="fallback-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
      </div>
      <div class="preview-info">
        <div class="preview-name" id="preview-name">—</div>
        <div class="preview-desc preview-loading loading-dots" id="preview-desc"> AI 설명 생성 중</div>
      </div>
    </div>

    <label>앱 이름</label>
    <input type="text" id="input-name" placeholder="앱 이름 (12자 이내)" maxlength="12">

    <label>짧은 설명</label>
    <textarea id="input-desc" placeholder="20자 이내로 설명해 주세요" maxlength="20" oninput="updateChar()"></textarea>
    <div class="char-wrap">
      <span class="char-count"><span id="char-count">0</span>/20</span>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveApp()">💾 저장</button>
    </div>
  </div>
</div>

<script>
let apps = [];
let editingId = null;
let urlTimer = null;
let pendingIcon = '';

/* ─ 저장/로드 ─ */
function loadApps() {
  try { apps = JSON.parse(localStorage.getItem('cenon-apps') || '[]'); } catch(e) { apps = []; }
  render();
}

function saveApps() {
  localStorage.setItem('cenon-apps', JSON.stringify(apps));
}

/* ─ 렌더 ─ */
function render() {
  const grid = document.getElementById('app-grid');
  const empty = document.getElementById('empty-state');
  const gridWrap = document.getElementById('grid-wrap');
  document.getElementById('app-count').textContent = `앱 ${apps.length}개`;

  if (apps.length === 0) {
    gridWrap.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  gridWrap.style.display = 'block';

  grid.innerHTML = apps.map(a => `
    <div class="app-item">
      <div class="app-actions">
        <button class="act-btn act-edit" onclick="openEdit('${a.id}')" title="수정">✏️</button>
        <button class="act-btn act-del" onclick="deleteApp('${a.id}')" title="삭제">🗑️</button>
      </div>
      <div class="app-icon-wrap" onclick="openApp('${esc(a.url)}')">
        ${a.icon
          ? `<img src="${esc(a.icon)}" alt="${esc(a.name)}" onerror="this.replaceWith(makeFallback())">`
          : `<svg class="fallback-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>`
        }
      </div>
      <div class="app-name">${esc(a.name)}</div>
    </div>
  `).join('');
}

function makeFallback() {
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 24 24');
  svg.setAttribute('class','fallback-icon-svg');
  svg.setAttribute('fill','none');
  svg.setAttribute('stroke','#ccc');
  svg.setAttribute('stroke-width','1.5');
  svg.innerHTML = '<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>';
  return svg;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function openApp(url) { window.open(url, '_blank'); }

/* ─ 모달 ─ */
function openAdd() {
  editingId = null;
  pendingIcon = '';
  document.getElementById('modal-emoji').textContent = '✨';
  document.getElementById('modal-title-text').textContent = '새 앱 추가';
  document.getElementById('input-url').value = '';
  document.getElementById('input-name').value = '';
  document.getElementById('input-desc').value = '';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('preview-area').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(id) {
  const a = apps.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  pendingIcon = a.icon || '';
  document.getElementById('modal-emoji').textContent = '🖊️';
  document.getElementById('modal-title-text').textContent = '앱 수정';
  document.getElementById('input-url').value = a.url;
  document.getElementById('input-name').value = a.name;
  document.getElementById('input-desc').value = a.desc || '';
  document.getElementById('char-count').textContent = (a.desc || '').length;
  showPreview(a.name, a.desc || '', a.icon || '');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function updateChar() {
  const v = document.getElementById('input-desc').value;
  document.getElementById('char-count').textContent = v.length;
  document.getElementById('preview-desc').textContent = v || '설명 없음';
  document.getElementById('preview-desc').className = 'preview-desc';
}

/* ─ URL 입력 핸들러 ─ */
function onUrlInput(val) {
  clearTimeout(urlTimer);
  if (!val.trim()) { document.getElementById('preview-area').style.display = 'none'; return; }
  urlTimer = setTimeout(() => fetchMeta(val.trim()), 700);
}

function getDomain(url) {
  try { return new URL(url).hostname; } catch(e) { return url; }
}

function getFavicon(url) {
  try {
    const host = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?sz=64&domain=${host}`;
  } catch(e) { return ''; }
}

function showPreview(name, desc, icon) {
  document.getElementById('preview-area').style.display = 'flex';
  document.getElementById('preview-name').textContent = name;
  document.getElementById('preview-desc').textContent = desc || '—';
  document.getElementById('preview-desc').className = 'preview-desc';
  const wrap = document.getElementById('preview-icon-wrap');
  wrap.innerHTML = icon
    ? `<img src="${esc(icon)}" alt="" style="width:34px;height:34px;object-fit:contain">`
    : `<svg class="fallback-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>`;
}

async function fetchMeta(url) {
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  document.getElementById('input-url').value = url;

  const domain = getDomain(url);
  const favicon = getFavicon(url);
  pendingIcon = favicon;

  document.getElementById('preview-area').style.display = 'flex';
  document.getElementById('preview-name').textContent = domain.replace('www.','');
  document.getElementById('preview-desc').className = 'preview-desc preview-loading loading-dots';
  document.getElementById('preview-desc').textContent = ' AI 설명 생성 중';

  const wrap = document.getElementById('preview-icon-wrap');
  wrap.innerHTML = favicon ? `<img src="${esc(favicon)}" alt="" style="width:34px;height:34px;object-fit:contain">` : '';

  const nameEl = document.getElementById('input-name');
  if (!nameEl.value) {
    nameEl.value = domain.replace('www.','').split('.')[0];
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 60,
        messages: [{
          role: 'user',
          content: `웹사이트 URL: ${url}\n도메인: ${domain}\n\n이 웹사이트 서비스를 한국어로 20자 이내의 짧고 귀여운 한 줄 설명으로 써줘. 이모지 없이, 설명 텍스트만 출력.`
        }]
      })
    });
    const data = await res.json();
    const desc = (data.content?.[0]?.text || '').trim().slice(0, 20);
    document.getElementById('input-desc').value = desc;
    document.getElementById('char-count').textContent = desc.length;
    document.getElementById('preview-desc').className = 'preview-desc';
    document.getElementById('preview-desc').textContent = desc || '설명 없음';
  } catch(e) {
    document.getElementById('preview-desc').className = 'preview-desc';
    document.getElementById('preview-desc').textContent = '설명을 가져오지 못했어요';
  }
}

/* ─ 저장/삭제 ─ */
function saveApp() {
  const url  = document.getElementById('input-url').value.trim();
  const name = document.getElementById('input-name').value.trim();
  const desc = document.getElementById('input-desc').value.trim();

  if (!url || !name) {
    alert('🌸 URL과 이름을 입력해 주세요!');
    return;
  }

  if (editingId) {
    const idx = apps.findIndex(a => a.id === editingId);
    if (idx >= 0) apps[idx] = { ...apps[idx], url, name, desc, icon: pendingIcon };
  } else {
    apps.push({ id: Date.now().toString(), url, name, desc, icon: pendingIcon });
  }

  saveApps();
  render();
  closeModal();
}

function deleteApp(id) {
  if (!confirm('이 앱을 삭제할까요? 🗑️')) return;
  apps = apps.filter(a => a.id !== id);
  saveApps();
  render();
}

/* ─ 시작 ─ */
loadApps();
</script>
